# CI/CD Pipeline for Fraud Detection System
name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Lint & Code Quality ─────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: |
          flake8 src/ --max-line-length=120 --ignore=E501,W503,E402

  # ── Unit Tests ──────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run preprocessing tests
        run: |
          pytest tests/test_preprocessing.py -v --tb=short

  # ── Docker Build ────────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t fraud-detection-api:latest .

      - name: Verify container starts
        run: |
          docker run -d --name test-api -p 8000:8000 fraud-detection-api:latest
          sleep 5
          curl -f http://localhost:8000/ || exit 1
          docker stop test-api
